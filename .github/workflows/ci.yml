name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, test, synth
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CDK_ENV: dev
      AWS_REGION: ap-northeast-2
      AWS_ACCOUNT_ID: '000000000000'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: CDK synth (with cdk-nag)
        working-directory: infrastructure
        run: npx cdk synth --strict
